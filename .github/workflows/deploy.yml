name: Deploy to Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          test -d /opt/elevated-sheets
          cd /opt/elevated-sheets
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          cd platform
          docker compose -f docker-compose.prod.yml -p elevated up -d --build
          docker compose -f docker-compose.prod.yml -p elevated ps
          curl -fsS --retry 10 --retry-delay 3 https://jobs.elevatedroofingandsiding.com/login >/dev/null
