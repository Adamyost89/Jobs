name: Deploy to Server

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          test -d /opt/elevated-sheets
          cd /opt/elevated-sheets
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          env_backup=""
          if [ -f platform/.env ]; then
            env_backup="$(mktemp /tmp/elevated-platform-env.XXXXXX)"
            cp platform/.env "$env_backup"
          fi
          git clean -fd
          if [ -n "$env_backup" ] && [ -f "$env_backup" ]; then
            cp "$env_backup" platform/.env
            rm -f "$env_backup"
          fi
          echo "Server repo now at commit: $(git rev-parse --short HEAD)"
          echo "Commit subject: $(git log -1 --pretty=%s)"

          if [ ! -f platform/.env ]; then
            echo "Missing required env file: platform/.env"
            echo "Create /opt/elevated-sheets/platform/.env on the server, then re-run deploy."
            exit 1
          fi

          cd platform
          compose_file="docker-compose.prod.yml"
          if [ ! -f "$compose_file" ]; then
            echo "Missing required production compose file: platform/$compose_file"
            echo "Ensure this file exists in the repo and is present on the server checkout."
            exit 1
          fi

          if ! docker compose -f "$compose_file" config --services | awk '$0=="app"{found=1} END{exit !found}'; then
            echo "Compose file $compose_file does not define required 'app' service."
            echo "Refusing deploy to avoid starting only database services."
            exit 1
          fi

          echo "Using compose file: $compose_file"
          # Free app host port if another Docker container is still publishing it.
          # This commonly happens when legacy/non-project containers are still running.
          mapfile -t port_3301_holders < <(docker ps --filter "publish=3301" --format '{{.ID}} {{.Names}}')
          if [ "${#port_3301_holders[@]}" -gt 0 ]; then
            echo "Port 3301 currently held by:"
            printf '  %s\n' "${port_3301_holders[@]}"
            for holder in "${port_3301_holders[@]}"; do
              holder_id="${holder%% *}"
              holder_name="${holder#* }"
              # Keep this project's current app container if present; compose will recreate it.
              if [ "$holder_name" = "elevated-app-1" ] || [ "$holder_name" = "platform-app-1" ]; then
                continue
              fi
              echo "Stopping conflicting container $holder_name ($holder_id)"
              docker stop "$holder_id" || true
              docker rm "$holder_id" || true
            done
          fi

          # Ensure DB is up first, then apply migrations with safe baseline fallback.
          docker compose -f "$compose_file" up -d db
          docker compose -f "$compose_file" ps

          set +e
          migrate_output="$(docker compose -f "$compose_file" run --rm --no-deps app npx prisma migrate deploy 2>&1)"
          migrate_code=$?
          set -e
          echo "$migrate_output"

          if [ "$migrate_code" -ne 0 ]; then
            if printf '%s\n' "$migrate_output" | awk '/Error: P3005/ {found=1} END{exit !found}'; then
              echo "Detected Prisma P3005; baselining existing migrations once."
              for m in $(ls -1 prisma/migrations | awk '/^[0-9]{14}_.+/ {print $0}'); do
                docker compose -f "$compose_file" run --rm --no-deps app npx prisma migrate resolve --applied "$m"
              done
              docker compose -f "$compose_file" run --rm --no-deps app npx prisma migrate deploy
            else
              echo "migrate deploy failed with non-baseline error."
              exit "$migrate_code"
            fi
          fi

          docker compose -f "$compose_file" up -d --build --force-recreate --remove-orphans
          docker compose -f "$compose_file" ps

          # Wait for the app to be reachable from inside the server first.
          # This avoids failing immediately on transient public 502s while the app boots.
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3301/login >/dev/null; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "App did not become ready on 127.0.0.1:3301"
              docker compose -f "$compose_file" logs --tail=200 app || true
              docker compose -f "$compose_file" logs --tail=200 db || true
              exit 1
            fi
            sleep 2
          done

          # Verify external routing after local app is healthy.
          curl -fsS --retry 20 --retry-delay 3 --retry-connrefused https://jobs.elevatedroofingandsiding.com/login >/dev/null
